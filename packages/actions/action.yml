name: 'SFPM Validate PR'
description: 'Validate a pull request by deploying source changes to a scratch org from the pool'
author: 'b64'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  devhub-username:
    description: 'DevHub username or alias for scratch org pool access'
    required: true
  pool-tag:
    description: 'Pool tag to fetch scratch orgs from'
    required: true
  cache-ttl-hours:
    description: 'How long to cache a scratch org for this PR (hours). Set to 0 to disable caching.'
    required: false
    default: '4'
  project-dir:
    description: 'Path to the SFPM project directory (defaults to workspace root)'
    required: false
  packages:
    description: 'Comma-separated list of packages to deploy. Defaults to all packages.'
    required: false

outputs:
  success:
    description: 'Whether all deployments succeeded (true/false)'
  org-username:
    description: 'Username of the scratch org used for validation'
  org-id:
    description: 'Org ID of the scratch org used'
  cache-hit:
    description: 'Whether a cached org was reused (true/false)'
  pr-number:
    description: 'PR number that was validated'
  duration:
    description: 'Total validation duration in milliseconds'
  result:
    description: 'Full JSON result with per-package outcomes'

runs:
  using: 'node20'
  main: 'dist/main.js'
